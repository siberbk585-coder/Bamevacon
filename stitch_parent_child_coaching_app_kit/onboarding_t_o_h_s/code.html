<!DOCTYPE html>

                        "on-secondary-container": "#00275d",
                        "surface-tint": "#9a4600",
                        "outline": "#8a7266",
                        "secondary-fixed": "#d8e2ff",

                        "on-tertiary-fixed": "#3f0017",

                        "primary-container": "#ff8a3d",
                        "tertiary-fixed": "#ffd9df",
                        "on-background": "#241914",

                    "borderRadius": {

                    },
                    "fontFamily": {
                        "body-md": ["Be Vietnam Pro", "sans-serif"],
                        "button-text": ["Quicksand", "sans-serif"],

                        "question-md": ["Quicksand", "sans-serif"]
                    },
                    "fontSize": {
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],

                        "question-lg": ["28px", { "lineHeight": "36px", "fontWeight": "700" }],

<style>
        body { font-family: 'Be Vietnam Pro', sans-serif; }
        .font-quicksand { font-family: 'Quicksand', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="bg-surface-bright text-on-surface min-h-screen flex items-center justify-center p-container-margin antialiased selection:bg-primary-container selection:text-on-primary-container">
<main class="w-full max-w-md">
<div class="bg-surface-container-lowest rounded-[20px] shadow-[0_4px_16px_rgba(0,0,0,0.06)] p-card-padding flex flex-col gap-lg border border-surface-container-high overflow-hidden relative">
<div class="absolute top-0 right-0 w-32 h-32 bg-primary-container rounded-bl-full opacity-20 -z-10 pointer-events-none"></div>
<div class="flex flex-col items-center justify-center pt-sm">
<div class="relative w-32 h-32 flex items-center justify-center">
<div class="absolute inset-0 bg-surface-container rounded-full animate-pulse opacity-50"></div>
<img alt="GuideLight Mascot" class="w-28 h-28 object-contain z-10 drop-shadow-sm" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDrLMZ2yfvzdGYfhIHjcg-eXwW4prctrBnP8LlZFBDouh1O1etrPjtBGN1MIfYccomdhL3hZbJdPkqZrXvP8DovnDu-4WaQlu8qa7cys2RcaXmI2HrNxsUTacymp6GMN80b5baAhT7Oh0ay-Trg-njuwWVoGMlErGdWnX2IlE-haLd38nGQpQwbau_kRV6hgSGkBdbP5PzzEJOpHEnm5fbg-XS-gwhtjHI41Tlov9NxFcpG9YzgvS0fbL_nb_3JnM9LhTfC-kQzDNw"/>
</div>
<div class="text-center mt-sm">
<h1 class="font-question-lg text-question-lg text-primary">Hồ sơ của bé</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs">Hãy cho chúng tôi biết một chút về người bạn nhỏ nhé.</p>
</div>
</div>
<form class="flex flex-col gap-md" onsubmit="event.preventDefault();">
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-primary pl-1 uppercase tracking-wider" for="child-name">Tên của bé</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline">face</span>
<input class="w-full h-[48px] pl-[44px] pr-md rounded-xl bg-surface-container-low border border-outline-variant font-body-md text-body-md text-on-surface placeholder:text-outline focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-shadow shadow-sm hover:border-outline" id="child-name" placeholder="Nhập tên gọi ở nhà hoặc tên thật" type="text"/>
</div>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-primary pl-1 uppercase tracking-wider" for="child-dob">Ngày sinh</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline">cake</span>
<input class="w-full h-[48px] pl-[44px] pr-md rounded-xl bg-surface-container-low border border-outline-variant font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-shadow shadow-sm hover:border-outline" id="child-dob" type="date"/>
</div>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-primary pl-1 uppercase tracking-wider">Giới tính</label>
<div class="flex gap-sm" id="gender-selection">
<button class="gender-btn flex-1 h-[48px] rounded-full border border-outline-variant bg-surface-container-low text-on-surface-variant font-button-text text-button-text flex items-center justify-center gap-2 transition-all hover:bg-surface-variant focus:outline-none active:scale-95" data-value="boy" type="button">
<span class="material-symbols-outlined text-xl">boy</span>
                            Bé trai
                        </button>
<button class="gender-btn flex-1 h-[48px] rounded-full border border-outline-variant bg-surface-container-low text-on-surface-variant font-button-text text-button-text flex items-center justify-center gap-2 transition-all hover:bg-surface-variant focus:outline-none active:scale-95" data-value="girl" type="button">
<span class="material-symbols-outlined text-xl">girl</span>
                            Bé gái
                        </button>
</div>
<input id="selected-gender" name="gender" type="hidden" value=""/>
</div>
</form>
<div class="mt-sm">
<button class="w-full h-[48px] rounded-full bg-primary text-on-primary font-button-text text-button-text shadow-md hover:shadow-lg hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group" type="button">
                    Bắt đầu
                    <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
<p class="text-center font-body-md text-[12px] text-outline mt-xs">
                Thông tin này giúp chúng tôi cá nhân hóa trải nghiệm.
            </p>
</div>
</main>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const genderBtns = document.querySelectorAll('.gender-btn');
            const hiddenGenderInput = document.getElementById('selected-gender');

            genderBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    genderBtns.forEach(b => {
                        b.classList.remove('bg-primary-container', 'text-on-primary-container', 'border-primary');
                        b.classList.add('bg-surface-container-low', 'text-on-surface-variant', 'border-outline-variant');
                        const icon = b.querySelector('.material-symbols-outlined');
                        if(icon) icon.style.fontVariationSettings = "'FILL' 0";
                    });

                    btn.classList.remove('bg-surface-container-low', 'text-on-surface-variant', 'border-outline-variant');
                    btn.classList.add('bg-primary-container', 'text-on-primary-container', 'border-primary');
                    const activeIcon = btn.querySelector('.material-symbols-outlined');
                    if(activeIcon) activeIcon.style.fontVariationSettings = "'FILL' 1";

                    hiddenGenderInput.value = btn.dataset.value;
                });
            });
        });
    </script>
</body></html>
